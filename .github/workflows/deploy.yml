name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: ["main", "develop"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    working-directory: app

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure build paths for branch
        working-directory: .
        run: |
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "NEXT_PUBLIC_SITE_URL=https://${OWNER_LC}.github.io" >> "$GITHUB_ENV"
          case "${{ github.ref }}" in
            refs/heads/main)
              echo "NEXT_PUBLIC_SITE_BASE_PATH=/Portfolio_Profesional" >> "$GITHUB_ENV"
              ;;
            refs/heads/develop)
              echo "NEXT_PUBLIC_SITE_BASE_PATH=/Portfolio_Profesional/uat" >> "$GITHUB_ENV"
              ;;
            *)
              echo "::error::Deploy workflow expects branch main or develop (ref: ${{ github.ref }})"
              exit 1
              ;;
          esac

      - name: Configure Firebase environment
        working-directory: .
        env:
          FIREBASE_API_KEY_SECRET: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN_SECRET: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID_SECRET: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET_SECRET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID_SECRET: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID_SECRET: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_API_KEY_VAR: ${{ vars.NEXT_PUBLIC_FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN_VAR: ${{ vars.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID_VAR: ${{ vars.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET_VAR: ${{ vars.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID_VAR: ${{ vars.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID_VAR: ${{ vars.NEXT_PUBLIC_FIREBASE_APP_ID }}
        run: |
          NEXT_PUBLIC_FIREBASE_API_KEY="${FIREBASE_API_KEY_SECRET:-$FIREBASE_API_KEY_VAR}"
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN="${FIREBASE_AUTH_DOMAIN_SECRET:-$FIREBASE_AUTH_DOMAIN_VAR}"
          NEXT_PUBLIC_FIREBASE_PROJECT_ID="${FIREBASE_PROJECT_ID_SECRET:-$FIREBASE_PROJECT_ID_VAR}"
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET="${FIREBASE_STORAGE_BUCKET_SECRET:-$FIREBASE_STORAGE_BUCKET_VAR}"
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID="${FIREBASE_MESSAGING_SENDER_ID_SECRET:-$FIREBASE_MESSAGING_SENDER_ID_VAR}"
          NEXT_PUBLIC_FIREBASE_APP_ID="${FIREBASE_APP_ID_SECRET:-$FIREBASE_APP_ID_VAR}"

          missing=0
          for name in \
            NEXT_PUBLIC_FIREBASE_API_KEY \
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN \
            NEXT_PUBLIC_FIREBASE_PROJECT_ID \
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET \
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID \
            NEXT_PUBLIC_FIREBASE_APP_ID
          do
            if [ -z "${!name}" ]; then
              echo "::error::Missing $name. Add it as a GitHub secret FIREBASE_* or repository variable NEXT_PUBLIC_FIREBASE_*."
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          {
            echo "NEXT_PUBLIC_FIREBASE_API_KEY=$NEXT_PUBLIC_FIREBASE_API_KEY"
            echo "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=$NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN"
            echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=$NEXT_PUBLIC_FIREBASE_PROJECT_ID"
            echo "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=$NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET"
            echo "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=$NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID"
            echo "NEXT_PUBLIC_FIREBASE_APP_ID=$NEXT_PUBLIC_FIREBASE_APP_ID"
          } >> "$GITHUB_ENV"

          echo "Firebase config loaded for project: $NEXT_PUBLIC_FIREBASE_PROJECT_ID"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Deploy production (gh-pages root)
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./app/out
          # Replace branch root so stale files (e.g. old docs/) do not trigger Jekyll on Pages.
          keep_files: false

      - name: Deploy UAT (gh-pages /uat)
        if: github.ref == 'refs/heads/develop'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./app/out
          destination_dir: uat
          keep_files: true
