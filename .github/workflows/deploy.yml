name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: ["main", "develop"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    working-directory: app

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure build paths for branch
        working-directory: .
        run: |
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "NEXT_PUBLIC_SITE_URL=https://${OWNER_LC}.github.io" >> "$GITHUB_ENV"
          case "${{ github.ref }}" in
            refs/heads/main)
              echo "NEXT_PUBLIC_SITE_BASE_PATH=/Portfolio_Profesional" >> "$GITHUB_ENV"
              ;;
            refs/heads/develop)
              echo "NEXT_PUBLIC_SITE_BASE_PATH=/Portfolio_Profesional/uat" >> "$GITHUB_ENV"
              ;;
            *)
              echo "::error::Deploy workflow expects branch main or develop (ref: ${{ github.ref }})"
              exit 1
              ;;
          esac

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Deploy production (gh-pages root)
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./app/out
          keep_files: true

      - name: Deploy UAT (gh-pages /uat)
        if: github.ref == 'refs/heads/develop'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./app/out
          destination_dir: uat
          keep_files: true
